<!DOCTYPE html>
<!-- Abre este archivo en el navegador, haz clic en los botones y guarda las imágenes como icon-192.png e icon-512.png en la carpeta icons/ -->
<html>
<head><title>Generar iconos DGT</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>Generador de iconos</h2>
<p>Haz clic derecho en cada imagen → "Guardar imagen como..." → guárdalas en la carpeta <code>icons/</code></p>

<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>

<div style="display:flex;gap:20px;margin-top:20px">
  <div>
    <p><strong>icon-192.png</strong></p>
    <img id="img192" style="border-radius:12px">
    <br><a id="dl192" download="icon-192.png">⬇ Descargar</a>
  </div>
  <div>
    <p><strong>icon-512.png</strong></p>
    <img id="img512" style="border-radius:12px;width:192px">
    <br><a id="dl512" download="icon-512.png">⬇ Descargar</a>
  </div>
</div>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.15;

  // Fondo degradado
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#6366f1');
  grad.addColorStop(1, '#0f172a');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, r);
  ctx.fill();

  // Coche (emoji-style simple)
  ctx.fillStyle = 'white';
  ctx.font = `bold ${s * 0.45}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚗', s / 2, s / 2 - s * 0.05);

  // Texto "DGT"
  ctx.font = `bold ${s * 0.14}px sans-serif`;
  ctx.fillText('DGT', s / 2, s * 0.78);
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

const img192 = document.getElementById('img192');
const img512 = document.getElementById('img512');
img192.src = c192.toDataURL();
img512.src = c512.toDataURL();

document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl512').href = c512.toDataURL('image/png');
</script>
</body>
</html>
